[sensor]
model = gc2053

[stream0]
width = 1920
height = 1080
fps = 30
bitrate = 2000000
codec = h264
rc_mode = cbr
gop = 30

[stream1]
width = 640
height = 360
fps = 30
bitrate = 500000
codec = h264
rc_mode = cbr

[audio]
enabled = true
sample_rate = 16000
codec = opus
ao_enabled = true

[rtsp]
port = 554
backchannel = true
backchannel = true

[http]
port = 8080
username =
password =

[osd]
enabled = true
font_size = 24

[osd.timestamp]
type = text
template = %time%
position = top_left

[osd.uptime]
type = text
template = %uptime%
position = top_right

[osd.camera]
type = text
template = Camera
position = top_center

[osd.logo]
type = image
path = /usr/share/images/thingino_100x30.bgra
width = 100
height = 30
position = bottom_right

[ircut]
enabled = false

[motion]
enabled = false

[recording]
enabled = false

[ring]
refmode = true

[jpeg]
enabled = true

[log]
level = warn
