# Raptor Streaming System configuration
# See raptor-docs for full option reference

[sensor]
name = gc4653
i2c_addr = 0x29
i2c_adapter = 0

[stream0]
width = 1920
height = 1080
fps = 25
codec = h264
profile = 2
bitrate = 2000000
rc_mode = vbr
gop = 50
min_qp = 15
max_qp = 45

[stream1]
enabled = true
width = 640
height = 360
fps = 25
codec = h264
profile = 0
bitrate = 500000
rc_mode = cbr
gop = 50

[jpeg]
enabled = true
quality = 75
fps = 1
bufshare = true

[ring]
main_slots = 32
main_data_mb = 4
sub_slots = 32
sub_data_mb = 1

[audio]
enabled = true
sample_rate = 16000
codec = l16
volume = 80
gain = 25

[rtsp]
port = 554
max_clients = 4

[http]
port = 8080

[osd]
enabled = true
font = /usr/share/fonts/default.ttf
font_size = 24
font_color = 0xFFFFFFFF
font_stroke = 1
time_enabled = true
time_format = %Y-%m-%d %H:%M:%S
uptime_enabled = true
text_enabled = true
text_string = Camera
logo_enabled = true
logo_path = /usr/share/images/thingino_210x64.bgra
logo_width = 210
logo_height = 64

[ircut]
enabled = true
mode = auto
day_threshold = 25000
night_threshold = 40000
hysteresis_sec = 5
gpio_ircut = 25
gpio_irled = 26

[log]
level = info
target = syslog
