# Raptor Streaming System configuration
# See raptor-docs for full option reference

[sensor]
# All values auto-detected from /proc/jz/sensor if omitted
# name = gc4653
# i2c_addr = 0x29
# i2c_adapter = 0
# fps = 0
# GPIO pins (default -1 = disabled):
# rst_gpio = -1               # sensor reset GPIO
# pwdn_gpio = -1              # sensor power down GPIO
# power_gpio = -1             # sensor power GPIO
# T40/T41 only:
# boot = 0                    # sensor boot mode (0=linear, 1=WDR, 2=60fps crop)
# mclk = 0                    # clock source (0=MCLK0, 1=MCLK1, 2=MCLK2)
# video_interface = 0         # video interface type (MIPI/DVP)
# antiflicker = 2             # 0=off, 1=50Hz, 2=60Hz (match your power grid frequency)
# low_latency = false         # encoder immediate output for all streams (saves ~100ms)

# ── Multi-sensor (dual/triple camera) ──
# To enable, replace [sensor] above with [sensor0] and add [sensor1].
# Requires: dual-sensor ISP firmware, fsync-capable sensor drivers (s0/s1 variants),
# and ISP module loaded with direct_mode=X + mipi_switch_gpio set.
# See raptor-docs/multi-sensor.md for full setup guide.
#
# [sensor0]
# name = sc2336p
# i2c_addr = 0x30
# i2c_adapter = 0
# sensor_id = 0
# width = 1920                # required: procfs doesn't report with s0/s1 drivers
# height = 1080
#
# [sensor1]
# name = sc2336ps1
# i2c_addr = 0x32
# i2c_adapter = 0
# sensor_id = 1
#
# [mipi_switch]
# enabled = false             # T23 only: set true if custom GPIO needed
# switch_gpio = 7             # GPIO controlling MIPI switch chip
# main_gstate = 0             # GPIO state to select main sensor
# sec_gstate = 1              # GPIO state to select secondary sensor
# switch_gpio2 = 0            # second MIPI switch GPIO (if needed)

[stream0]
# width = 1920                # defaults to sensor resolution if omitted
# height = 1080
# fps = 25
# codec = h264
# profile = 2
# bitrate = 3000000
# max_bitrate = 0             # 0 = auto (4/3 of target for capped modes)
# rc_mode = cbr               # cbr/vbr/capped_vbr/capped_quality/fixqp
# gop = 30
# min_qp = -1                 # -1 = SDK default
# max_qp = -1                 # -1 = SDK default
# init_qp = -1                # initial QP (-1 = auto, only used with fixqp rc_mode)
# ip_delta = -1               # QP delta I vs P frames (-1 = SDK default, T31+)
# pb_delta = -1               # QP delta P vs B frames (-1 = SDK default, T31+)
# max_psnr = 0                # PSNR quality cap for capped modes (0 = SDK default, T31+)
# nr_vbs = 2
# ivdc = true                 # ISP-VPU Direct Connect (T23+ only, reduces rmem)
# osd_enabled = true          # per-stream OSD (default true)
# jpeg = true                 # per-stream JPEG snapshot (default true)
# jpeg_quality = 75           # override [jpeg] quality
# jpeg_fps = 1                # override [jpeg] fps

[stream1]
# enabled = true
# width = 640
# height = 360
# fps = 25
# codec = h264
# profile = 2
# bitrate = 1000000
# max_bitrate = 0             # 0 = auto (4/3 of target for capped modes)
# rc_mode = cbr               # cbr/vbr/capped_vbr/capped_quality/fixqp
# gop = 30
# min_qp = -1                 # -1 = SDK default
# max_qp = -1                 # -1 = SDK default
# init_qp = -1                # initial QP (-1 = auto, only used with fixqp rc_mode)
# ip_delta = -1               # QP delta I vs P frames (-1 = SDK default, T31+)
# pb_delta = -1               # QP delta P vs B frames (-1 = SDK default, T31+)
# max_psnr = 0                # PSNR quality cap for capped modes (0 = SDK default, T31+)
# nr_vbs = 2
# osd_enabled = true          # per-stream OSD (default true)
# jpeg = true                 # per-stream JPEG snapshot (default true)
# jpeg_quality = 75           # override [jpeg] quality
# jpeg_fps = 1                # override [jpeg] fps

# ── Sensor 1 streams (multi-sensor only) ──
# [sensor1_stream0]
# width = 1920
# height = 1080
# fps = 25
# codec = h264
# profile = 2
# bitrate = 2500000
# rc_mode = vbr
# gop = 50
# min_qp = 20
# max_qp = 42
# nr_vbs = 2
# ivdc = true                 # IVDC for dual-sensor (requires ISP direct_mode=2)
# osd_enabled = true          # per-stream OSD (default true)
#
# [sensor1_stream1]
# enabled = true
# width = 640
# height = 360
# fps = 25
# codec = h264
# profile = 2
# bitrate = 1000000
# rc_mode = vbr
# gop = 50
# min_qp = 22
# max_qp = 38
# nr_vbs = 2
# osd_enabled = true          # per-stream OSD (default true)

[image]
# brightness = 128             # 0-255
# contrast = 128               # 0-255
# saturation = 128             # 0-255
# sharpness = 128              # 0-255
# hue = 128                    # 0-255
# sinter = 128                 # spatial noise reduction (0-255, T20-T31 only)
# temper = 128                 # temporal noise reduction (0-255, T20-T31 only)
# ae_comp = 128                # AE compensation (0-255)
# max_again = 160              # max analog gain (0-160, higher = more noise in low light)
# max_dgain = 80               # max digital gain (0-160)
# dpc_strength = 128           # dead pixel correction (0-255, T23/T31 only)
# drc_strength = 128           # dynamic range compression (0-255, T21/T23/T31 only)
# defog_strength = 128         # defog / dehaze (0-255, T23/T31 only)
# highlight_depress = 0        # highlight depression (0-255, T20-T31 only)
# backlight_comp = 0           # backlight compensation (0-10, T23/T31 only)
# hflip = 0                    # horizontal flip (0 or 1)
# vflip = 0                    # vertical flip (0 or 1)

# ── Sensor 1 image (multi-sensor only) ──
# [sensor1_image]
# brightness = 128
# contrast = 128
# saturation = 128
# sharpness = 128
# hue = 128
# sinter = 128
# temper = 128
# ae_comp = 128
# max_again = 160
# max_dgain = 80
# hflip = 0
# vflip = 0

[jpeg]
# enabled = true
# quality = 75
# fps = 1
# bufshare = true
# idle = true                   # stop JPEG encoder when no viewers (saves CPU/VPU)
# Per-stream: set jpeg = false, jpeg_quality, jpeg_fps in [streamN] sections

[ring]
# main_slots = 32
# main_data_mb = 0            # 0 = auto-size from bitrate (recommended)
# sub_slots = 32
# sub_data_mb = 0             # 0 = auto-size from bitrate

[audio]
# enabled = true
# sample_rate = 16000
# codec = l16                 # pcmu, pcma, l16, aac, opus
# opus_complexity = 0         # 0-10 (lower = less CPU, default 5)
# bitrate = 128000            # for aac/opus (bits per second)
# volume = 80
# gain = 25
# device = 1                  # audio input device number
# Audio output (speaker / backchannel)
# ao_enabled = false
# ao_volume = 80
# ao_gain = 25
# Audio effects (requires libaudioProcess.so)
# ns_enabled = true           # noise suppression
# ns_level = moderate         # low, moderate, high, veryhigh
# hpf_enabled = true          # high-pass filter (removes DC offset / low rumble)
# agc_enabled = true          # automatic gain control
# agc_target_dbfs = 10        # target level (0-31 dBfs)
# agc_compression_db = 0      # compression gain (0-90 dB)

[rtsp]
# enabled = true
# port = 554
# max_clients = 4
# endpoint_main = stream0            # custom main stream path (default: /stream0)
# endpoint_sub = stream1             # custom sub stream path (default: /stream1)
# username = admin
# password = secret
# tls = false                 # enable RTSPS (default port changes to 322)
# tls_cert = /etc/ssl/certs/uhttpd.crt
# tls_key = /etc/ssl/private/uhttpd.key
# session_name = Raptor Live  # SDP session name (s=)
# session_info =              # SDP session description (i=)
# session_timeout = 60        # RTSP session timeout in seconds (min 10)
# tcp_sndbuf = 65536          # TCP send buffer bytes (lower = less latency)

[http]
# enabled = true
# port = 8080
# max_clients = 4
# username = admin
# password = secret
# https = false               # HTTPS for snapshots/MJPEG (requires cert + key)
# cert = /etc/ssl/certs/uhttpd.crt
# key = /etc/ssl/private/uhttpd.key

[osd]
# enabled = true
# Use ISP OSD instead of IPU OSD (T23/T32/T40/T41 only).
# ISP OSD works with IVDC and has zero DDR bandwidth overhead.
# IPU OSD is the default and works on all platforms.
# isp_osd = false
# font = /usr/share/fonts/default.ttf
# font_size = 24
# font_color = 0xFFFFFFFF
# font_stroke = 1
# stroke_color = 0xFF000000
# time_enabled = true
# time_format = %Y-%m-%d %H:%M:%S
# uptime_enabled = true
# text_enabled = true
# text_string = Camera
# privacy_color = 0xFF000000
# logo_enabled = true
# logo_path = /usr/share/images/thingino_100x30.bgra
# logo_width = 100
# logo_height = 30
# Per-stream positions: top_left, top_center, top_right,
#   bottom_left, bottom_center, bottom_right, center, or x,y coords
# stream0_font_size = 24
# stream0_time_pos = top_left
# stream0_uptime_pos = top_right
# stream0_text_pos = top_center
# stream0_logo_pos = bottom_right
# stream1_font_size = 12
# stream1_time_pos = top_left
# stream1_uptime_pos = top_right
# stream1_text_pos = top_center
# stream1_logo_pos = bottom_right

[ircut]
# enabled = true
# mode = auto                 # auto, day, or night
# trigger = luma              # luma (default), gain (legacy), or adc (photoresistor)
# night_luma = 20             # ae_luma below this -> night (0-255)
# night_gain = 80000          # total_gain above this -> night (regardless of luma)
# day_gain_pct = 25           # night->day: gain below this % of night baseline
# adc_channel = 0             # ADC channel for photoresistor (trigger=adc)
# adc_night = 200             # ADC below this -> night (trigger=adc)
# adc_day = 600               # ADC above this -> day (trigger=adc)
# night_threshold = 40000     # total_gain above this -> night (trigger=gain only)
# day_threshold = 25000       # total_gain below this -> day (trigger=gain only)
# hysteresis_sec = 5          # consecutive seconds before switching
# poll_interval_ms = 1000
# gpio_ircut = -1             # -1 = auto from /etc/thingino.json
# gpio_ircut2 = -1
# gpio_irled = -1

[recording]
# enabled = false
# mode = continuous           # continuous, motion, or both
# stream = 0
# audio = true
# segment_minutes = 5
# storage_path = /mnt/mmcblk0p1/raptor
# max_storage_mb = 0
# prebuffer_sec = 5           # seconds of pre-event footage in motion clips (0-5)
# clip_length_sec = 60        # motion clip max duration before rotation
# clip_max_mb = 100           # max total clip storage

[webrtc]
# enabled = true
# udp_port = 8443
# http_port = 8554
# max_clients = 2
# cert = /etc/ssl/certs/uhttpd.crt
# key = /etc/ssl/private/uhttpd.key
# https = true                # HTTPS for signaling (enables Talk button in browser)
# local_ip =                  # auto-detected if omitted
# audio_mode = auto           # auto (passthrough when possible) or opus (always transcode)
# opus_complexity = 2          # 0-10, transcode encoder complexity (lower = less CPU)
# opus_bitrate = 64000         # transcode encoder bitrate (bps)
# username = admin              # HTTP Basic auth (both required to enable)
# password = secret

[webcam]
# enabled = false
# device = /dev/video0        # UVC gadget device
# jpeg_stream = jpeg0         # ring for MJPEG mode
# h264_stream = video0        # ring for H.264 mode
# buffers = 4                 # V4L2 buffer count
# audio = true                # enable USB microphone
# audio_stream = audio0       # audio ring (requires codec = l16 in [audio])

[webtorrent]
# enabled = false
# tracker = wss://tracker.openwebtorrent.com
# stun_server = stun.l.google.com
# stun_port = 19302
# tls_verify = true           # verify tracker TLS cert (needs ca-certificates.crt)
# viewer_url = https://viewer.thingino.com/share.html
# share_key =                 # fixed share key (min 8 chars, auto-generated if omitted)

[motion]
# enabled = false
# algorithm = move            # move, base_move, persondet, yolo
# sensitivity = 3             # move: 0-4, persondet: 0-5
# grid = 4x4                  # move only: auto-generate ROI grid (default 4x4 = 16 zones)
# cooldown_sec = 10
# poll_interval_ms = 500
# skip_frames = 5             # process every Nth frame in IVS
# record = true               # start recording on motion
# record_post_sec = 30        # continue recording after motion stops
# gpio_pin = -1               # GPIO to assert on motion
# Explicit ROI override (disables grid):
# roi_count = 2
# roi0 = 0,0,319,179
# roi1 = 320,180,639,359
#
# persondet options:
# det_distance = 2            # 0=6m 1=8m 2=10m 3=11m 4=13m
# motion_trigger = false      # require motion before running DL
#
# yolo options:
# model = /usr/share/models/magik_model_yolov5.bin
# num_classes = 4             # must match the model
# conf_threshold = 40         # percent (0-100)
# nms_threshold = 50          # percent (0-100)

[log]
# level = debug                  # fatal, error, warn, info, debug, trace
# target = syslog                # syslog, stderr, file
# file = /var/log/raptor.log   # path when target = file
