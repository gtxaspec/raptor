name: Tests

on:
  workflow_dispatch:

jobs:
  build-asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git curl \
            autoconf automake libtool meson ninja-build python3 \
            libopus-dev

      - name: Build all daemons with ASan+UBSan
        run: ./build-asan.sh

      - name: Symlink sibling repos for tests/Makefile
        run: |
          # tests/Makefile references ../../raptor-common and
          # ../../raptor-ipc. build-asan.sh already cloned them under
          # asan-out/deps/; symlink into the expected sibling path.
          ln -sfn "$PWD/asan-out/deps/raptor-common" ../raptor-common
          ln -sfn "$PWD/asan-out/deps/raptor-ipc"    ../raptor-ipc

      - name: Unit tests (under ASan)
        run: |
          cd tests
          make SAN=address clean
          make SAN=address test

  build-tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git curl \
            autoconf automake libtool meson ninja-build python3 \
            libopus-dev

      - name: Build all daemons with TSan
        run: ./build-asan.sh tsan

      - name: Symlink sibling repos for tests/Makefile
        run: |
          ln -sfn "$PWD/asan-out/deps/raptor-common" ../raptor-common
          ln -sfn "$PWD/asan-out/deps/raptor-ipc"    ../raptor-ipc

      - name: Unit tests (under TSan)
        run: |
          cd tests
          make SAN=thread clean
          make SAN=thread test
