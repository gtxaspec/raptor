name: Tests

on:
  workflow_dispatch:

jobs:
  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git curl \
            autoconf automake libtool meson ninja-build python3 \
            libopus-dev ffmpeg

      - name: Symlink sibling repos for unit test Makefile
        run: |
          # test-all.sh builds via build-asan.sh which clones sibling
          # repos into asan-out/deps/. Unit tests/Makefile references
          # ../../raptor-common etc. — build first, then symlink.
          ./build-asan.sh
          ln -sfn "$PWD/asan-out/deps/raptor-common" ../raptor-common
          ln -sfn "$PWD/asan-out/deps/raptor-ipc"    ../raptor-ipc
          ln -sfn "$PWD/asan-out/deps/raptor-hal"    ../raptor-hal

      - name: Full test suite (ASAN)
        run: ./tests/test-all.sh --soak 300

  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git curl \
            autoconf automake libtool meson ninja-build python3 \
            libopus-dev ffmpeg

      - name: Symlink sibling repos for unit test Makefile
        run: |
          ./build-asan.sh tsan
          ln -sfn "$PWD/asan-out/deps/raptor-common" ../raptor-common
          ln -sfn "$PWD/asan-out/deps/raptor-ipc"    ../raptor-ipc
          ln -sfn "$PWD/asan-out/deps/raptor-hal"    ../raptor-hal

      - name: Full test suite (TSAN)
        run: ./tests/test-all.sh --tsan --soak 300
