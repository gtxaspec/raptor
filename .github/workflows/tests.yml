name: Tests

on:
  workflow_dispatch:

jobs:
  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git curl \
            autoconf automake libtool meson ninja-build python3 \
            libopus-dev ffmpeg

      - name: Symlink sibling repos for unit test Makefile
        run: |
          ./build-asan.sh
          ln -sfn "$PWD/asan-out/deps/raptor-common" ../raptor-common
          ln -sfn "$PWD/asan-out/deps/raptor-ipc"    ../raptor-ipc
          ln -sfn "$PWD/asan-out/deps/raptor-hal"    ../raptor-hal

      - name: Full test suite (ASAN)
        run: ./tests/test-all.sh --soak 300

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asan-logs
          path: |
            asan-out/test-logs/
            asan-out/leak-logs/

  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git curl \
            autoconf automake libtool meson ninja-build python3 \
            libopus-dev ffmpeg

      - name: Symlink sibling repos for unit test Makefile
        run: |
          ./build-asan.sh tsan
          ln -sfn "$PWD/asan-out/deps/raptor-common" ../raptor-common
          ln -sfn "$PWD/asan-out/deps/raptor-ipc"    ../raptor-ipc
          ln -sfn "$PWD/asan-out/deps/raptor-hal"    ../raptor-hal

      - name: Full test suite (TSAN)
        run: ./tests/test-all.sh --tsan --soak 300

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tsan-logs
          path: |
            asan-out/test-logs/
            asan-out/leak-logs/
