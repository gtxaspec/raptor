<!DOCTYPE html>
<html><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Raptor WebRTC</title>
<style>body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif}
video{width:100%;max-height:90vh;object-fit:contain;background:#000}
button{margin:10px;padding:8px 24px;font-size:16px;cursor:pointer;border:1px solid #555;background:#222;color:#fff;border-radius:4px}
button:hover{background:#333}button.active{background:#600;border-color:#a00}
select{margin:10px;padding:8px;font-size:16px;background:#222;color:#fff;border:1px solid #555;border-radius:4px}
#status{color:#888;font-size:14px}</style>
</head><body>
<video id='v' autoplay muted playsinline></video>
<div><select id='stream'><option value='0'>Main</option><option value='1'>Sub</option></select><button id='btn' onclick='toggle()'>Connect</button><button id='mute' onclick='toggleMute()' style='display:none'>Unmute</button><button id='talk' onclick='toggleTalk()' style='display:none'>Talk</button><span id='status'></span></div>
<script>
const DEBUG=new URLSearchParams(location.search).has('debug');
function dbg(...a){if(DEBUG)console.log('%c[RWD]','color:#0af',... a)}
function dbgSdp(label,sdp){if(!DEBUG)return;console.groupCollapsed('%c[RWD]%c '+label,'color:#0af','color:#aaa');
  const codecs=[],ice=[];for(const l of sdp.split('\r\n')){if(l.startsWith('a=rtpmap:'))codecs.push(l);if(l.startsWith('a=candidate:'))ice.push(l)}
  if(codecs.length)console.log('Codecs:\n'+codecs.join('\n'));if(ice.length)console.log('ICE candidates:\n'+ice.join('\n'));console.log(sdp);console.groupEnd()}
let pc=null,resource=null,micStream=null,micSender=null,statsIv=null;
const v=document.getElementById('v'),btn=document.getElementById('btn'),st=document.getElementById('status');
function startStats(){if(!DEBUG||statsIv)return;statsIv=setInterval(async()=>{if(!pc)return;const s=await pc.getStats();s.forEach(r=>{
  if(r.type==='inbound-rtp'&&r.kind==='video')dbg('video:',r.framesPerSecond+'fps',Math.round((r.bytesReceived||0)*8/1000)+'kbit total','lost:'+r.packetsLost);
  if(r.type==='inbound-rtp'&&r.kind==='audio')dbg('audio:','lost:'+r.packetsLost,'jitter:'+r.jitter);
  if(r.type==='candidate-pair'&&r.state==='succeeded')dbg('rtt:',r.currentRoundTripTime+'s')})},5000)}
function stopStats(){clearInterval(statsIv);statsIv=null}
async function start(){
  st.textContent='Connecting...';
  dbg('creating PeerConnection (local WHIP)');
  pc=new RTCPeerConnection({iceServers:[]});
  pc.addTransceiver('video',{direction:'recvonly'});
  const at=pc.addTransceiver('audio',{direction:'sendrecv'});
  try{const caps=RTCRtpSender.getCapabilities('audio').codecs;const pcmu=caps.filter(c=>c.mimeType==='audio/PCMU');const opus=caps.filter(c=>c.mimeType==='audio/opus');if(pcmu.length){at.setCodecPreferences([...pcmu,...opus]);dbg('audio preference: PCMU first, then Opus')}}catch(e){}
  pc.ontrack=e=>{dbg('track received:',e.track.kind,e.track.id);if(!v.srcObject){v.srcObject=new MediaStream()}v.srcObject.addTrack(e.track);v.muted=true;v.play().catch(()=>{})};
  pc.onicecandidate=e=>{if(e.candidate)dbg('local ICE:',e.candidate.type,e.candidate.protocol,e.candidate.address+':'+e.candidate.port)};
  pc.oniceconnectionstatechange=()=>{dbg('ICE state:',pc.iceConnectionState);st.textContent=pc.iceConnectionState;
    if(pc.iceConnectionState==='connected'||pc.iceConnectionState==='completed')startStats();
    if(pc.iceConnectionState==='failed'||pc.iceConnectionState==='disconnected')stop()};
  pc.onsignalingstatechange=()=>{dbg('signaling:',pc.signalingState)};
  pc.onicegatheringstatechange=()=>{dbg('ICE gathering:',pc.iceGatheringState)};
  dbg('creating offer...');
  const offer=await pc.createOffer();
  dbgSdp('Local offer',offer.sdp);
  await pc.setLocalDescription(offer);
  await new Promise(r=>{if(pc.iceGatheringState==='complete')r();else pc.onicegatheringstatechange=()=>{dbg('ICE gathering:',pc.iceGatheringState);if(pc.iceGatheringState==='complete')r()}});
  dbgSdp('Offer (with candidates)',pc.localDescription.sdp);
  const stream=document.getElementById('stream').value;
  dbg('WHIP POST /whip?stream='+stream);
  const whipUrl=new URL('/whip?stream='+stream,location.href);whipUrl.username='';whipUrl.password='';
  const resp=await fetch(whipUrl.href,{method:'POST',headers:{'Content-Type':'application/sdp'},body:pc.localDescription.sdp});
  if(!resp.ok){dbg('WHIP error:',resp.status,resp.statusText);st.textContent='Error: '+resp.status;return}
  resource=resp.headers.get('Location');
  dbg('WHIP resource:',resource);
  const sdp=await resp.text();
  dbgSdp('Remote answer',sdp);
  await pc.setRemoteDescription({type:'answer',sdp});
  btn.textContent='Disconnect';document.getElementById('mute').style.display='';
  if(sdp.includes('a=sendrecv')&&navigator.mediaDevices){dbg('backchannel audio available');document.getElementById('talk').style.display=''}
  document.getElementById('stream').disabled=true;
}
async function stop(){
  dbg('stopping');stopStats();stopTalk();
  if(resource){const u=new URL(resource,location.href);u.username='';u.password='';fetch(u.href,{method:'DELETE'}).catch(()=>{})}
  if(pc)pc.close();
  pc=null;resource=null;v.srcObject=null;
  btn.textContent='Connect';st.textContent='';document.getElementById('mute').style.display='none';document.getElementById('talk').style.display='none';document.getElementById('stream').disabled=false;
}
function toggle(){pc?stop():start()}
function toggleMute(){v.muted=!v.muted;document.getElementById('mute').textContent=v.muted?'Unmute':'Mute'}
async function toggleTalk(){
  if(micStream){stopTalk();return}
  try{
    dbg('requesting microphone');
    micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const track=micStream.getAudioTracks()[0];
    dbg('mic track:',track.label,track.getSettings());
    const txcv=pc.getTransceivers().find(t=>t.receiver.track&&t.receiver.track.kind==='audio');
    if(txcv){txcv.sender.replaceTrack(track);micSender=txcv.sender}
    else{micSender=pc.addTrack(track,micStream)}
    document.getElementById('talk').textContent='Stop Talk';document.getElementById('talk').classList.add('active');
  }catch(e){dbg('mic error:',e);st.textContent='Mic: '+e.message}
}
function stopTalk(){
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;dbg('mic stopped')}
  if(micSender&&pc){try{micSender.replaceTrack(null)}catch(e){}micSender=null}
  document.getElementById('talk').textContent='Talk';document.getElementById('talk').classList.remove('active');
}
</script></body></html>
